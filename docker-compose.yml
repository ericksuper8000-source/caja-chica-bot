version: '3.8'

services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      - ENVIRONMENT=local
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - .:/code
    environment:
      - ENVIRONMENT=local
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_local_secure_pass
      - POSTGRES_DB=cajachica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: