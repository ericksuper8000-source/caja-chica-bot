services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp_key.json
    volumes:
      - .:/code
      - ${GCP_KEY_PATH:-./secrets/gcp_key.json}:/secrets/gcp_key.json:ro
    depends_on:
      - redis
      - db

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp_key.json
    volumes:
      - .:/code
      - ${GCP_KEY_PATH:-./secrets/gcp_key.json}:/secrets/gcp_key.json:ro
    depends_on:
      - redis
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cajachicadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: