name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_local_secure_pass
          POSTGRES_DB: cajachica
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy pytest pytest-asyncio pydantic pydantic-settings
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Black (Formateador)
      run: black --check app/ workers/ services/ tests/

    - name: Run Ruff (Linter moderno)
      run: ruff check app/ workers/ services/ tests/

    - name: Run Mypy (Validación estricta de Type Hints)
      run: mypy --strict app/

    - name: Run Pytest (Suite de Pruebas Unitarias)
      env:
        ENVIRONMENT: test
        DATABASE_URL: postgresql://postgres:postgres_local_secure_pass@localhost:5432/cajachica
        REDIS_URL: redis://localhost:6379/0
        META_WEBHOOK_VERIFY_TOKEN: test_token
        OPENAI_API_KEY: test_key
      run: pytest tests/