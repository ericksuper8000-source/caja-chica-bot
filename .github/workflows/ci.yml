name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    # ... (tus servicios de postgres y redis se mantienen igual) ...

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy pytest pydantic pydantic-settings
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Black (Formateador)
      # Usamos --check aquí, pero el ENV arriba evitará los errores de codificación
      run: black --check app/ workers/ services/ tests/

    # ... (resto de tus steps: Ruff, Mypy, Pytest) ...