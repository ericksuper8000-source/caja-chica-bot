stages:
  - quality-and-tests

variables:
  # Configuración para que las herramientas de Python reconozcan la codificación correcta
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"
  # Configuración de variables para el contenedor de PostgreSQL
  POSTGRES_DB: "caja_chica_db"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "password"
  POSTGRES_HOST_AUTH_METHOD: "trust"

quality-and-tests:
  stage: quality-and-tests
  image: python:3.12
  
  # Inicializa los contenedores de soporte tal como lo hacía GitHub Actions
  services:
    - name: postgres:15-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis

  before_script:
    # Actualizar pip e instalar herramientas de calidad globalmente
    - python -m pip install --upgrade pip
    - pip install black ruff mypy pytest pydantic pydantic-settings
    # Instalar las dependencias de la aplicación
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  script:
    # 1. Formateo con Black
    - black --check app/ workers/ services/ tests/
    
    # 2. Linter con Ruff
    - ruff check app/ workers/ services/ tests/
    
    # 3. Tipado estático con Mypy (ya sin el __init__.py en la raíz)
    - mypy --strict app/
    
    # 4. Pruebas unitarias con Pytest (puedes descomentar esto cuando añadas los tests)
    # - pytest

  # Reglas para ejecutar el pipeline de forma idéntica a los Pull Requests o pushes a ramas clave
  only:
    - merge_requests
    - develop
    - main