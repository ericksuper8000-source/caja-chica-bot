stages:
  - quality-and-tests

variables:
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"
  POSTGRES_DB: "caja_chica_db"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "password"
  POSTGRES_HOST_AUTH_METHOD: "trust"
  ENVIRONMENT: "test"

quality-and-tests:
  stage: quality-and-tests
  image: python:3.12
  
  services:
    - name: postgres:15-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis

  before_script:
    - python -m pip install --upgrade pip
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

  script:
    - black app/ workers/ services/ tests/
    - ruff check --fix app/ workers/ services/ tests/
    - mypy --strict app/
    - pytest tests/

  only:
    - merge_requests
    - develop
    - main